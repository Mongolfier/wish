name: Docker Image CI

on:
  push:
    branches: ['main']

jobs:
  npm_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  python_audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --extra dev
      - run: uv pip install pip-audit
      - run: uv run pip-audit

  build_and_push_images:
    needs: [npm_audit, python_audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add registry to /etc/hosts
        run: echo "${{ secrets.SERVER_URL }} ${{ secrets.REGISTRY }}" | sudo tee -a /etc/hosts

      - name: Install CA certificate
        run: |
          sudo mkdir -p /etc/docker/certs.d/${{ secrets.REGISTRY }}:5000
          echo "${{ secrets.CA_CERT }}" | sudo tee /etc/docker/certs.d/${{ secrets.REGISTRY }}:5000/ca.crt
          sudo systemctl restart docker

      - name: Build and push Docker images
        run: |
          trap "docker logout ${{ secrets.REGISTRY }}:5000 || true" EXIT
          VERSION=$(date +%s)
          docker login -u ${{ secrets.REGISTRY_USER }} -p ${{ secrets.REGISTRY_PASS }} ${{ secrets.REGISTRY }}:5000

          docker build . --file Dockerfile --tag ${{ secrets.REGISTRY }}:5000/wish-react-app:$VERSION
          docker tag ${{ secrets.REGISTRY }}:5000/wish-react-app:$VERSION ${{ secrets.REGISTRY }}:5000/wish-react-app:latest
          docker push --all-tags ${{ secrets.REGISTRY }}:5000/wish-react-app

          docker build . --file Dockerfile.storybook --tag ${{ secrets.REGISTRY }}:5000/wish-storybook:$VERSION
          docker tag ${{ secrets.REGISTRY }}:5000/wish-storybook:$VERSION ${{ secrets.REGISTRY }}:5000/wish-storybook:latest
          docker push --all-tags ${{ secrets.REGISTRY }}:5000/wish-storybook

          docker build ./apps/backend --file apps/backend/Dockerfile --tag ${{ secrets.REGISTRY }}:5000/wish-api:$VERSION
          docker tag ${{ secrets.REGISTRY }}:5000/wish-api:$VERSION ${{ secrets.REGISTRY }}:5000/wish-api:latest
          docker push --all-tags ${{ secrets.REGISTRY }}:5000/wish-api

          docker logout ${{ secrets.REGISTRY }}:5000

  deploy_to_server:
    needs: build_and_push_images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy configs to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_URL }}
          username: ${{ secrets.USER }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SERVER_PRIVATE_SSH_KEY }}
          source: 'docker-compose.yml,.nginx/nginx.conf,apps/backend/.env.prod'
          target: /app/wish

      - name: Pull and run latest images
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_URL }}
          username: ${{ secrets.USER }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SERVER_PRIVATE_SSH_KEY }}
          envs: DOCKER_REGISTRY
          script: |
            sudo mkdir -p /etc/docker/certs.d/${{ secrets.REGISTRY }}:5000
            echo "${{ secrets.CA_CERT }}" | sudo tee /etc/docker/certs.d/${{ secrets.REGISTRY }}:5000/ca.crt > /dev/null

            cd /app/wish
            mkdir -p apps/backend

            {
              echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}"
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}"
            } > .env

            grep -vE '^(DATABASE_URL|SMTP_PASSWORD)=' apps/backend/.env.prod > apps/backend/.env
            {
              echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}"
              echo "DATABASE_URL=postgresql+psycopg://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@db:5432/${{ secrets.POSTGRES_DB }}"
            } >> apps/backend/.env

            docker login -u ${{ secrets.REGISTRY_USER }} -p ${{ secrets.REGISTRY_PASS }} ${{ secrets.REGISTRY }}:5000
            DOCKER_REGISTRY=$DOCKER_REGISTRY docker compose pull
            DOCKER_REGISTRY=$DOCKER_REGISTRY docker compose up -d --no-build
            docker logout ${{ secrets.REGISTRY }}:5000
            docker exec wish-nginx nginx -s reload || docker restart wish-nginx
            docker exec wish-storybook nginx -s reload || true
            docker compose ps
            docker compose logs --tail=30 api db || true
        env:
          DOCKER_REGISTRY: ${{ secrets.REGISTRY }}:5000
