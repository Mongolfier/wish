services:
  nginx:
    image: nginx:alpine
    container_name: wish-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./.nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/:/etc/nginx/ssl:ro
    depends_on:
      - wish-app
      - wish-storybook
      - api
    restart: unless-stopped

  wish-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY}/wish-react-app:latest
    container_name: wish-app
    expose:
      - '3000'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_ORIGIN=http://api:8000
    depends_on:
      - api

  wish-storybook:
    build:
      context: .
      dockerfile: Dockerfile.storybook
    image: ${DOCKER_REGISTRY}/wish-storybook:latest
    container_name: wish-storybook
    expose:
      - '80'
    restart: unless-stopped

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY}/wish-api:latest
    container_name: wish-api
    restart: unless-stopped
    expose:
      - '8000'
    env_file:
      - ./apps/backend/.env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: wish-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - '${POSTGRES_HOST_PORT:-15432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
