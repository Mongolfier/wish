services:
  nginx:
    image: nginx:alpine
    container_name: wish-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./.nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/:/etc/nginx/ssl:ro
    depends_on:
      - wish-app
      - wish-storybook
    restart: unless-stopped

  wish-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY}/wish-react-app:latest
    container_name: wish-app
    expose:
      - '3000'
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  wish-storybook:
    build:
      context: .
      dockerfile: Dockerfile.storybook
    image: ${DOCKER_REGISTRY}/wish-storybook:latest
    container_name: wish-storybook
    expose:
      - '80'
    restart: unless-stopped

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://wish:wish@db:5432/wish
      ALLOWED_ORIGINS: 'http://localhost:3000,http://127.0.0.1:3000'
      OAUTH_REDIRECT_BASE: http://localhost:3000
      GOOGLE_OAUTH_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: wish-db
    environment:
      POSTGRES_USER: wish
      POSTGRES_PASSWORD: wish
      POSTGRES_DB: wish
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wish -d wish']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
